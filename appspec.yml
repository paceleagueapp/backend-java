version: 0.0
os: linux

files:
  - source: /
    destination: /opt/paceleague/
    overwrite: true

permissions:
  - object: /opt/paceleague
    pattern: "**"
    owner: ec2-user
    group: ec2-user

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: root

  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/start.sh
      timeout: 1800
      runas: root

  ValidateService:
    - location: scripts/validate.sh
      timeout: 120
      runas: root