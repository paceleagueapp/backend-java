name: Build & Deploy (CodeDeploy)

on:
  push:
    branches: [ "main" ]  # master면 master로

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Create bundle zip
        run: |
          mkdir -p bundle
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gradle' \
            --exclude 'build' \
            --exclude 'bundle' \
            --exclude 'deploy.zip' \
            ./ bundle/
          cd bundle
          zip -r ../deploy.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://${{ secrets.DEPLOY_S3_BUCKET }}/paceleague/deploy-${{ github.sha }}.zip

      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name "${{ secrets.CODEDEPLOY_APP_NAME }}" \
            --deployment-group-name "${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}" \
            --s3-location bucket=${{ secrets.DEPLOY_S3_BUCKET }},key=paceleague/deploy-${{ github.sha }}.zip,bundleType=zip